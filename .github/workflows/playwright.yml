name: Playwright E2E

on:
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest @shopify/theme@latest

      - name: Deploy preview theme
        id: deploy
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
        run: |
          output=$(shopify theme push --unpublished --json --no-color --name="pr-${{ github.event.pull_request.number }}")
          preview_url=$(echo "$output" | jq -r '.theme.editor_url' | sed 's|/editor||')
          echo "preview_url=$preview_url" >> $GITHUB_OUTPUT

      - name: Run Playwright tests
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview: ${{ steps.deploy.outputs.preview_url }}\n\n✅ Playwright tests passed`
            })
